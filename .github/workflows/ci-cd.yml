name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Frontend Linting
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Monorepo Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

      # Backend Build check & Security Checks
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile Backend
        run: mvn compile
        working-directory: backend

      # Run dependency scanning (Node Audit and Maven check)
      - name: Run Audit on Frontend
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  test-and-build:
    name: Test & Build
    needs: lint-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Test Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Monorepo Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Frontend Tests
        run: npm run test --workspace=frontend

      - name: Build Frontend
        run: npm run build --workspace=frontend

      # Test Backend
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend Package
        run: mvn package -DskipTests
        working-directory: backend

  docker-build-push:
    name: Docker Build & Push
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

      # Run Trivy vulnerability scanner on images
      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:latest
          format: 'table'
          exit-code: '0' # Report but don't block release
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:latest
          format: 'table'
          exit-code: '0' # Report but don't block release
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Production
    needs: docker-build-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.PROD_SERVER_HOST != ''
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT || 22 }}
          script: |
            cd /app/fixit-hub
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  notify:
    name: Notify Status
    needs: [lint-and-scan, test-and-build, docker-build-push]
    if: always() && secrets.SLACK_WEBHOOK != ''
    steps:
      - name: Slack Notification on Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: rtcamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: 'Deployment Successful'
          SLACK_MESSAGE: 'Version ${{ github.sha }} has been successfully built, tested, containerized, and deployed to production.'
          SLACK_COLOR: '#2eb886'

      - name: Slack Notification on Failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: rtcamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: 'Pipeline Failed'
          SLACK_MESSAGE: 'CI/CD Pipeline failed during execution. Please check the logs.'
          SLACK_COLOR: '#a30200'
